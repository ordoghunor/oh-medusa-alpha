services:
  postgres:
    image: postgres:16-alpine
    container_name: medusa-postgres
    environment:
      POSTGRES_DB: medusa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medusa"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: medusa-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medusa-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/medusa
      REDIS_URL: redis://redis:6379
      STORE_CORS: http://localhost:8000
      ADMIN_CORS: http://localhost:7001,http://localhost:9000
      AUTH_CORS: http://localhost:7001,http://localhost:9000
      JWT_SECRET: supersecret
      COOKIE_SECRET: supersecret
    ports:
      - "9000:9000"
    command: >
      sh -c "cd apps/backend && npx medusa db:migrate && npm run start"

  storefront:
    build:
      context: .
      dockerfile: Dockerfile.storefront
    container_name: medusa-storefront
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://backend:9000
    ports:
      - "8000:8000"

volumes:
  postgres-data:
